<!doctype html>
<html lang="ko"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <div th:replace="~{|recruit/include/admin/inc_admin_head|}"></div>
</head>
<body id="page-top">
    <div class="wrapper goodList">
        <div th:replace="~{|recruit/include/admin/inc_admin_header|}"></div>

        <div class="container">
            <div th:replace="~{|recruit/include/admin/inc_admin_side_left|}"></div>
            <div class="contents">
                <div class="inner">
                    <div class="tabWrap">
                        <div class="tabCon">
                            <div class="tab">
                                <div class="headerArea flexBox">
                                    <h2>권한관리</h2>
                                    <div class="link">관리자 관리 &gt; 권한관리</div>
                                </div>
                                <ul class="outInfo2 mt10">
                                    <li>관리자 권한을 등록하고 확인하실 수 있습니다.</li>
                                </ul>
                                <div class="item mt20">
                                    <div class="itemCon show">
                                        <div class="recruitColumn v2">
                                            <h4>검색어</h4>
                                            <div class="rightCon mb10">
                                                <select name="searchType" id="searchType" class="wdh_218">
                                                    <option value="authName">권한명</option>
                                                </select>
                                                <input type="text" class="limit ml5 wdh_450" id="searchKeyword" placeholder="검색어를 입력해주세요." onkeyup="enterKey(event);">
                                            </div>
                                        </div>

                                        <div class="recruitColumn v2">
                                            <h4>기간</h4>
                                            <div class="rightCon">
                                                <div class="selWrap">
                                                    <select name="" id="" class="wdh_218">
                                                        <option value="">등록일</option>
                                                    </select>
                                                </div>
                                                <div class="dateBox flexBox mt10">
                                                    <div class="radioWrap flexBox">
                                                        <input type="radio" id="dayAll" name="dayType" value="all" class="square" checked="checked">
                                                        <label for="dayAll">전체</label>
                                                        <input type="radio" id="dayPeriod" name="dayType" value="period" class="square">
                                                        <label for="dayPeriod">기간</label>
                                                    </div>
                                                </div>
                                                <div class="dateBox flexBox mt10 dateTerms" style="visibility:hidden">
                                                    <div class="radioWrap flexBox">
                                                        <input type="radio" id="day" name="day" value="1" class="square" checked>
                                                        <label for="day">오늘</label>
                                                        <input type="radio" id="day7" name="day" value="7" class="square">
                                                        <label for="day7">1주일</label>
                                                        <input type="radio" id="day30" name="day" value="30" class="square">
                                                        <label for="day30">1개월</label>
                                                        <input type="radio" id="day90" name="day" value="90" class="square">
                                                        <label for="day90">3개월</label>
                                                        <input type="radio" id="day180" name="day" value="180" class="square">
                                                        <label for="day180">6개월</label>
                                                        <input type="radio" id="day365" name="day" value="365" class="square">
                                                        <label for="day365">1년</label>
                                                    </div>
                                                    <div class="calWrap flexBox">
                                                        <div class="inpWrap">
                                                            <input type="text" placeholder="" class="" id="str_date" readonly/>
                                                        </div>
                                                        <span class="inpTxt ml5">~</span>
                                                        <div class="inpWrap ml5">
                                                            <input type="text" placeholder="" class="" id="end_date" readonly/>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="btnWrap">
                                            <button class="btnType btnSize44 btnLineG3" onclick="fn_searchReset()">초기화</button>
                                            <button class="btnType btnSize44 btnColorP2" onclick="fn_searchList()">조회</button>
                                        </div>
                                    </div>
                                </div>

                                <!-- item -->
                                <div class="item">
                                    <p class="total2 pt20">권한목록 <span class="small ml5">총 <em id="totalCount"></em>개</span></p>
                                    <div class="tblTop">
                                        <button type="button" class="btnType btnSize36 btnLineG" onclick="fn_openRegPop()">권한등록</button>
                                        <div>
                                            <select name=regDate"" id="regDate" class="wdh_160">
                                                <option value="">등록일순</option>
                                            </select>
                                            <select name="pageRow" id="pageRow" class="wdh_160 ml5" onchange="fn_searchList()">
                                                <option value="10" selected>10개씩</option>
                                                <option value="30">30개씩</option>
                                                <option value="50">50개씩</option>
                                                <option value="100">100개씩</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div id="grid_admin_goods_list" class="gridWrap">
                                        <div class="card" style="overflow-x: auto;">
                                            <table id="searchList" class="p-datatable" style="width:100%">
                                                <thead class="p-datatable-thead">
                                                <tr>
                                                    <th style="width: 6%;">No</th>
                                                    <th style="width: 10%;">권한명</th>
                                                    <th style="width: 50%;">권한메뉴</th>
                                                    <th style="width: 10%;">등록일</th>
                                                    <th style="width: 6%;">변경</th>
                                                    <th style="width: 6%;">삭제</th>
                                                </tr>
                                                </thead>
                                                <tbody></tbody>
                                            </table>

                                        </div>
                                        <!-- Paginator 컴포넌트 -->
                                        <div class="p-paginator p-paginator-bottom" id="PAGE_NAVI">
                                        </div>
                                        <input type="hidden" id="PAGE_INDEX" name="PAGE_INDEX" value="1"/>
                                    </div><!-- item -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="popLayer" class="popOverlay c popClose">
            <div class="popWrap">
                <div class="popInner">
                    <span class="btnPopClose" onclick="popLayerClose();">닫기</span>
                    <h2>권한 등록</h2>
                    <!-- popup 업체 정보 -->
                    <div class="popCnt type1">
                        <div class="popItemCon">
                            <div class="mr10">
                                <div class="popTblTop v3 mt10">
                                    <p>관리자 정보</p>
                                </div>
                                <div class="popBasicTblWrap mt20">
                                    <table>
                                        <input type="hidden" id="seq"/>
                                        <colgroup>
                                            <col width="32%">
                                            <col width="auto">
                                        </colgroup>
                                        <tbody>
                                        <tr>
                                            <th>권한명</th>
                                            <td><input type="text" class="productTit popInfo wdh_full" id="name"></td>
                                        </tr>
                                        <tr>
                                            <th>권한메뉴</th>
                                            <td id="menuList">
                                                <th:block th:each="menu : ${menuList}" th:if="${menu.dept == 1}">
                                                    <div class="mt5">
                                                        <span th:text="${'- ' + menu['name']}"></span>
                                                    </div>
                                                    <th:block th:each="subMenu, itemStat : ${menuList}" th:if="${menu['seq'] == subMenu['upperSeq']}">
                                                        <div class="ml10">
                                                            <input th:id="${'menu'+itemStat}" type="checkbox" class="chkRoundSmall" th:value="${subMenu.seq}" name="menuSeq">
                                                            <label th:for="${'menu'+itemStat}"><span th:text="${subMenu.name}"></span></label>
                                                        </div>
                                                    </th:block>
                                                </th:block>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div class="btnWrap">
                            <button class="btnType btnSize44 btnLineG3" onclick="popLayerClose();">취소</button>
                            <button class="btnType btnSize44 btnColorP2" id="sendBtn" onclick="fn_registerAuthInfo();">등록</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script th:inline="javascript">

    let recordTotal = 0;
    let _menuSeqs = '';
    let _menuList = /*[[${menuList}]]*/ [];
    $(document).ready(function(){
        getHistoryList('init');
    });

    function getHistoryList(type){
        let param = {
            "PAGE_INDEX":$("#PAGE_INDEX").val(),
            "pageRow":$("#pageRow").val(),
            "searchType": $('#searchType').val(),
            "searchKeyword" : $('#searchKeyword').val()
        }
        if($('input[name=dayType]:checked').val() != 'all'){
            param.strDate = $('#str_date').val();
            param.endDate = $('#end_date').val();
        }

        $.ajax({
            url : "/recruit/admin/ajax/selectAuthList",
            data : JSON.stringify(param),
            type : 'POST',
            contentType : 'application/json',
            beforeSend : function(xhr) {
                $('.loading').show();
            },
            success : function(data) {
                recordTotal = data.data.total;
                if(type == 'init'){
                    getHistoryListCallback(data.data);
                }else {
                    reDrawTable(data.data);
                }

            },
            error : function(jqXHR, textStatus, errorThrown) {
                confirmModal({title:'오류발생'})
            },
            complete:function (){
                $('.loading').hide();
            }
        })

    }

    function getHistoryListCallback(data){
        var total = data.total;
        var params = {
            divId : "PAGE_NAVI",
            pageIndex : "PAGE_INDEX",
            totalCount : total,
            recordCount : $("#pageRow").val(),
            eventName : "getHistoryList"
        };
        gfn_renderPaging(params);

        var list = data.list;
        var table = $('#searchList').DataTable({
            destroy: true,
            data: list,
            columnDefs: [
                { targets: [0,1,3,4,5], className: 'text-center' },
                { targets: 2, className: 'text-list' }
            ],
            columns: [
                {
                    data: null,
                    render: function (data, type, row, meta) {
                        let currentPage = $('#PAGE_INDEX').val();
                        let recordCount = $("#pageRow").val();
                        let no = recordTotal - ((currentPage -1 ) * recordCount) - meta.row;
                        return no;
                    }
                },
                {data: 'name'},
                {
                    data: null,
                    render: function (data, type, row) {
                        let menuList = data.adminMenuList;
                        let menuStr = ''
                        $.each(menuList, function(index, item){
                            if(item.dept == 1){
                                menuStr += (menuStr == '' ? '' : '<br>');
                                menuStr += ' - ' + item.name
                                let subMenuStr = ''
                                $.each(menuList, function(i, t){
                                   if(item.seq == t.upperSeq){
                                       subMenuStr += (subMenuStr == '' ? ' : ' : ', ');
                                       subMenuStr +=  t.name
                                   }
                                });
                                menuStr += subMenuStr
                            }
                        })
                        return menuStr;
                    }
                },
                {data: 'regDt'},
                {
                    data: null,
                    render: function (data, type, row) {
                        return '<button class="btnType btnColorB btnSize22 txtBlue" onclick=\'fn_openUpdatePopup("'+data.authCd+'")\'>수정</button>';
                    }
                },
                {
                    data: null,
                    render: function (data, type, row) {
                        return '<button class="btnType btnColorR btnSize22 txtRed" onclick=\'fn_deleteAuthInfo("'+data.authCd+'")\'>삭제</button>';
                    }
                }
            ],
            scrollY: false,
            scrollX: false,
            paging: true,
            pageLength: 100,
            dom: 't',
            language: {
                emptyTable: "조회하신 결과가 없습니다",
                info: "Showing _START_ to _END_ of _TOTAL_ entries"
            },
            order: [0, 'desc']
        });
        $('.total2 #totalCount').html(numberWithCommas(total));
    }

    function fn_openRegPop() {
        $('#name').val('');
        $('input[name=menuSeq]').prop('checked', false);
        $('#popLayer').find('h2').text('권한 등록');
        $('#sendBtn').text('등록');
        $('#popLayer').removeClass('popClose');
    }

    function fn_openUpdatePopup(authCd){
        let param = {
            "authCd" : authCd
        }
        $.ajax({
            url : "/recruit/admin/ajax/selectAuthInfo",
            data : JSON.stringify(param),
            type : 'POST',
            contentType : 'application/json',
            beforeSend : function(xhr) {
                $('.loading').show();
            },
            success : function(data) {
                let info = data.data.info;
                let menuSeqs = info.menuSeqs;
                _menuSeqs = menuSeqs;
                let menuSeqArr = menuSeqs.split(',');
                $('input[name=menuSeq]').prop("checked", false);
                let list = data.data.menuList;
                _menuList = list;
                html = '';
                $.each(list, function (idx, menu){
                    if(menu.dept == '1'){
                        html += `<div class="mt5">
                                    <span>- ${menu.name}</span>
                                </div>`
                        $.each(list, function (subIdx, subMenu){
                            if(menu.seq == subMenu.upperSeq){
                                html += `<div class="ml10">
                                            <input id="${'menu'+subIdx}" type="checkbox" class="chkRoundSmall" value="${subMenu.seq}" name="menuSeq">
                                            <label for="${'menu'+subIdx}"><span>${subMenu.name}</span></label>
                                        </div>`
                            }
                        })
                    }
                });
                $('#menuList').html(html);

                $.each(menuSeqArr, function (index, item){
                    $('input[name=menuSeq][value="' + item + '"]').prop("checked", true);
                })
                $('#seq').val(info.authCd);
                $('#name').val(info.name);
                $('#popLayer').find('h2').text('권한 수정');
                $('#sendBtn').text('수정');
                $('#popLayer').removeClass('popClose');
            },
            error : function(jqXHR, textStatus, errorThrown) {
                confirmModal({title:'오류발생'})
            },
            complete:function (){
                $('.loading').hide();
            }
        })


    }

    function fn_registerAuthInfo(){
        let menuSeqs = '';
        let menuList = _menuList;
        let upperSeq = 0;
        $.each( $('input[name=menuSeq]:checked') , function(i,e){
            $.each(menuList, function(index, item){
                if(item.dept == 2 && item.seq == $(e).val()){
                    if(upperSeq != item.upperSeq){
                        upperSeq = item.upperSeq
                        menuSeqs += menuSeqs == '' ? '' : ',';
                        menuSeqs += upperSeq
                    }
                }
            });
            menuSeqs += ','+$(e).val();
        });

        let name = $('#name').val().replaceAll(' ','');
        let useYn = $('#useYn').val();
        if(name == ''){
            confirmModal({title : '권한명을 입력해주세요'});
            return;
        }
        if(menuSeqs == ''){
            confirmModal({title : '권한메뉴를 선택해주세요'});
            return;
        }

        let param = {
            'menuSeqs': menuSeqs,
            'name': name,
            'type': 'A',
            "useYn": useYn
        }
        let url = '';
        if($('#sendBtn').text() == '등록'){
            url = '/recruit/admin/ajax/insertAuthInfo';
        }else{
            param.authCd = $('#seq').val();
            url = '/recruit/admin/ajax/updateAuthInfo';
        }
        $.ajax({
            url : url,
            data : JSON.stringify(param),
            type : 'POST',
            contentType : 'application/json',
            beforeSend : function(xhr) {
                $('.loading').show();
            },
            success : function(data) {
                let msg = data.resultMsg;
                confirmModal({title : msg, confirm : function (){
                        alertLayerClose();
                        if(data.resultCd == 'S'){
                            popLayerClose();
                            getHistoryList();
                        }
                    }})
            },
            error : function(jqXHR, textStatus, errorThrown) {
                confirmModal({title:'오류발생'})
            },
            complete:function (){
                $('.loading').hide();
            }
        })
    }


    function fn_deleteAuthInfo(authCd){

        confirmModal({title:'해당 권한을 삭제하시겠습니까?', cancelUse:true, confirm: function(){
                alertLayerClose();
                let param = {
                    authCd : authCd
                    , useYn : 'N'
                };
                $.ajax({
                    url : '/recruit/admin/ajax/updateAuthUseYn',
                    data : JSON.stringify(param),
                    type : 'POST',
                    contentType : 'application/json',
                    beforeSend : function(xhr) {
                        $('.loading').show();
                    },
                    success : function(data) {
                        let msg = data.resultMsg;
                        confirmModal({title : msg, confirm : function (){
                                alertLayerClose();
                                if(data.resultCd == 'S'){
                                    popLayerClose();
                                    getHistoryList();
                                }
                            }})
                    },
                    error : function(jqXHR, textStatus, errorThrown) {
                        confirmModal({title:'오류발생'})
                    },
                    complete:function (){
                        $('.loading').hide();
                    }
                })
            }})

    }

</script>
</html>
