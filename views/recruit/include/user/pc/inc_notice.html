<section class="notice-panel" aria-label="알림 패널">
    <div class="notice-panel__header">
        <h2 class="notice-panel__title">알림</h2>
        <div class="notice-panel__title-box">
            <button type="button" class="notice-panel__setting" aria-label="알림 설정">
                <div class="notice-panel__icon setting"></div>
            </button>
            <button type="button" class="notice-panel__setting notice-panel__close" aria-label="알림 닫기">
                <div class="notice-panel__icon close"></div>
            </button>
        </div>
    </div>
    <section class="notice-panel__inner">
        <section class="notice-panel__group">
            <h3 class="notice-panel__group-title">오늘 받은 알림</h3>
            <ul class="notice-panel__card-list" id="todayNoticeList"></ul>
            <button type="button" class="notice-panel__more" id="noticeMoreBtn">
                <span>더보기</span>
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M5 8L10 13L15 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </section>
        <section class="notice-panel__group">
            <h3 class="notice-panel__group-title">나의 활동</h3>
            <ul class="notice-panel__activity-list" id="activityList"></ul>
            <button type="button" class="notice-panel__more" id="activityMoreBtn">
                <span>더보기</span>
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M5 8L10 13L15 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </section>
    </section>
</section>

<script th:inline="javascript">
    fn_getNotice();

    function fn_getNotice() {
        $.ajax({
            url: '/recruit/user/notice',
            type: 'post',
            contentType: 'application/json',
            success: function (data) {
                const $list = $('#todayNoticeList');
                const $moreBtn = $('.notice-panel__more');
                const noticeList = [
                    { type: '공고 마감', time: '10:00', title: '일자리 창출 플랫폼 채용' },
                    { type: '지원 완료', time: '11:30', title: '돌봄 서비스 매니저 채용' },
                    { type: '서류 합격', time: '13:20', title: '헬스케어 플랫폼 UI 디자이너' },
                    { type: '면접 일정', time: '14:00', title: '프론트엔드 개발자 채용' },
                    { type: '최종 합격', time: '15:10', title: '커머스 서비스 기획자' },
                    { type: '지원 완료', time: '16:40', title: '데이터 분석가 채용' },
                ];

                $list.empty();
                let html = '';

                if (noticeList.length === 0) {
                    html += `
          <li class="notice-panel__empty">
            도착한 알림이 없습니다.
          </li>
        `;
                    $moreBtn.hide();
                } else {
                    $.each(noticeList, function (index, item) {

                        const hiddenClass = index >= 3 ? 'is-hidden' : '';

                        html += `
            <li class="${hiddenClass}">
              <article class="notice-panel__card">
                <div class="notice-panel__card-meta">
                  <span>${item.type}</span>
                  <time datetime="${item.time}">${item.time}</time>
                </div>
                <div class="notice-panel__card-title">${item.title}</div>
              </article>
            </li>
          `;
                    });

                    if (noticeList.length > 3) {
                        $moreBtn.show();
                    } else {
                        $moreBtn.hide();
                    }
                }

                $list.append(html);
            }
        });
    }
    fn_renderActivity()
    function fn_renderActivity() {
        const $list = $('#activityList');
        const $btn = $('#activityMoreBtn');

        const data = [
            { time: '04/27 10:00', text: '입사 지원 완료' },
            { time: '04/27 11:30', text: '공고 열람' },
            { time: '04/27 13:20', text: '스크랩' },
            { time: '04/27 14:00', text: '지원 완료' },
            { time: '04/27 15:10', text: '열람' }
        ];

        $list.empty();

        let html = '';

        if (data.length === 0) {
            html = `<li class="notice-panel__empty">아직 활동하신 내역이 없습니다.</li>`;
            $btn.hide();
        } else {
            $.each(data, function (i, item) {
                const hidden = i >= 3 ? 'is-hidden' : '';

                html += `
        <li class="notice-panel__activity-item ${hidden}">
          <div class="notice-panel__activity-time">${item.time}</div>
          <div class="notice-panel__activity-box">${item.text}</div>
        </li>
      `;
            });

            data.length > 3 ? $btn.show() : $btn.hide();
        }

        $list.append(html);
    }


    $('#noticeMoreBtn').on('click', function () {
        toggleList($(this), $('#todayNoticeList'));
    });

    $('#activityMoreBtn').on('click', function () {
        toggleList($(this), $('#activityList'));
    });

    function toggleList($btn, $list) {
        const isOpen = $btn.hasClass('is-open');
        if (isOpen) {
            $list.children('li').each(function (i) {
                if (i >= 3) $(this).addClass('is-hidden');
            });
            $btn.removeClass('is-open')
                .attr('aria-expanded', 'false')
                .find('span').text('더보기');
        } else {
            $list.find('li.is-hidden').removeClass('is-hidden');
            $btn.addClass('is-open')
                .attr('aria-expanded', 'true')
                .find('span').text('접기');
        }
    }
</script>
