<script th:inline="javascript">
    $(function () {
        const $menuBtn = $(".re-menus");
        const $subAll = $(".sub-all");
        const $parts = $(".sub-menu__part");

        $menuBtn.on("click", function (e) {
            e.stopPropagation();
            let isOpen = $(this).attr("aria-expanded") === "true";
            $(this).attr("aria-expanded", !isOpen);
            $parts.find(".menu-box").stop(true, true).slideUp(200);
            if (isOpen) {
                $subAll.attr("aria-hidden", "true").stop(true, true).slideUp(250);
            } else {
                $subAll.attr("aria-hidden", "false").stop(true, true).slideDown(250);
            }
        });
        $subAll.on("click", function (e) {
            e.stopPropagation();
        });
        $(document).on("click", function () {
            $menuBtn.attr("aria-expanded", false);
            $subAll.attr("aria-hidden", "true").stop(true, true).slideUp(250);
            $parts.find(".menu-box").stop(true, true).slideUp(200);
        });
        $(".sub-menu__btn").on("click", function (e) {
            e.stopPropagation();
            $menuBtn.attr("aria-expanded", false);
            $subAll.attr("aria-hidden", "true").stop(true, true).slideUp(250);
            const $currentPart = $(this).closest(".sub-menu__part");
            const $currentBox = $currentPart.find(".menu-box");
            const isOpen = $currentBox.is(":visible");
            $parts.find(".menu-box").stop(true, true).slideUp(200);
            if (!isOpen) {
                $currentBox.stop(true, true).slideDown(200);
            }
        });
    });
</script>
