<script th:inline="javascript">
    $(function () {
        const $notice = $(".notice");
        const $panel = $(".rehead-notice");

        $(".re-menu").on("click", function () {
            $(this).attr("aria-expanded", $(this).attr("aria-expanded") !== "true");
        });
        $notice.on("click", function () {
            const open = !$panel.hasClass("is-open");
            $panel.toggleClass("is-open", open);
            $notice.attr("aria-expanded", open);
        });
        $(".notice-panel__close").on("click", function () {
            $panel.removeClass("is-open");
            $notice.attr("aria-expanded", false);
        });
        $(document).on("click", function (e) {
            if (!$(e.target).closest(".notice, .rehead-notice").length) {
                $panel.removeClass("is-open");
                $notice.attr("aria-expanded", false);
            }
        });
    });
</script>
