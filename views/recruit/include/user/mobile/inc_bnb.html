  <button type="button" class="mobile-bnb-quick__btn" onclick="fn_mobileScrollTop()" aria-label="맨 위로 이동">
    <span class="mobile-bnb-quick__icon mobile-bnb-quick__icon--top" aria-hidden="true"></span>
    <span class="mobile-bnb-quick__label">TOP</span>
  </button>
</div>

  </li>
</ul>
<script th:inline="javascript">
  function fn_mobileScrollTop() {
    $('html, body').stop().animate({
      scrollTop: 0
    }, 300);
  }

  $(function () {
    const $quick = $('#mobile-bnb-quick');
    const visibleScrollTop = 120;

    if (!$quick.length) {
      return;
    }
    const fn_toggleMobileBnbQuick = function () {
      const isVisible = $(window).scrollTop() > visibleScrollTop;
      const activeElement = document.activeElement;

      if (!isVisible && activeElement && $quick.has(activeElement).length) {
        activeElement.blur();
      }

      $quick.toggleClass('is-visible', isVisible);

      if (isVisible) {
        $quick.removeAttr('inert');
      } else {
        $quick.attr('inert', '');
      }
    };
    $(window).off('scroll.mobileBnbQuick').on('scroll.mobileBnbQuick', fn_toggleMobileBnbQuick);
    fn_toggleMobileBnbQuick();
  });
</script>
