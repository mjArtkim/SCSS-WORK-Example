<!DOCTYPE html>
<html lang="ko" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{|sso/include/user/inc_head|}"></div>
</head>
<body data-aos-easing="ease-out" data-aos-duration="700" data-aos-delay="0">
<div class="app-shell app-shell--auth app-shell--quick-actions-hidden app-shell--join">
    <div class="app-body">
        <div class="site-header header-box wrap join-header-wrap">
            <div th:replace="~{|sso/include/user/inc_header|}"></div>
        </div>
        <main class="site-content" aria-live="polite">
            <section class="join-page wrap">
                <div class="join-page__wrap">
                    <button class="join-page__back" type="button" data-role="join-back" aria-label="이전 단계로 이동" onclick="goBack()">
                        <span class="icon-svg join-page__back-icon" data-icon-name="chevron_left" aria-hidden="true" style="--icon-url: url('/img/sso/user/icons/chevron_left_icon.svg');"></span>
                    </button>
                    <form class="join-form" data-form="join" data-step="6">
                        <section class="join-form__panel join-form__panel--intro is-active" data-sheet-step="6">
                            <div class="join-form__body">
                                <header class="join-form__header">
                                    <h2 class="join-form__title">돌보미 이용을 위해 동의가 필요해요</h2>
                                </header>
                                <div class="join-form__sheet-list">
                                    <label class="join-form__agreement join-form__agreement--summary">
                                        <input type="checkbox" data-role="agree-required"/>
                                        <span>아래 약관 및 개인정보처리방침에 동의합니다.</span>
                                    </label>

                                    <section class="join-form__agreement-card">
                                        <label class="join-form__agreement">
                                            <input type="checkbox" data-role="agree-required" name="termsOfUse"/>
                                            <span><em>[필수]</em> 개인정보 이용약관에 동의합니다.</span>
                                        </label>
                                        <button class="join-form__detail-button" type="button" data-role="open-terms-modal" data-terms-key="termsOfUse" onclick="openTermsModal(this)">
                                            내용 보기
                                        </button>
                                    </section>
                                    <section class="join-form__agreement-card">
                                        <label class="join-form__agreement">
                                            <input type="checkbox" data-role="agree-required" name="privacyPolicy"/>
                                            <span><em>[필수]</em> 개인 정보 처리 방침에 동의합니다.</span>
                                        </label>
                                        <button class="join-form__detail-button" type="button" data-role="open-terms-modal" data-terms-key="privacyPolicy" onclick="openTermsModal(this)">
                                            내용 보기
                                        </button>
                                    </section>
                                </div>
                            </div>
                            <div class="join-form__footer">
                                <button class="join-form__button join-form__button--primary" type="button" data-role="join-next" onclick="location.href='/userJoinInfo'">
                                    다음
                                </button>
                            </div>
                        </section>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <div class="footer-box">
        <div th:replace="~{|sso/include/user/inc_footer|}"></div>
    </div>
</div>
</body>
<script th:inline="javascript">


        $(document).ready(function () {
            $(".join-header-wrap").show();
            const userAgent = window.navigator.userAgent.toLowerCase();
            const isApp = userAgent.indexOf('android') > -1 || userAgent.indexOf('iphone') > -1;
            if (isApp) {
                $(".join-header-wrap").hide();
            }

            const $allAgree = $('[data-role="agree-required"]:not([name])');
            const $subCheckboxes = $('.join-form__agreement-card input[data-role="agree-required"]');
            const $nextButton = $('[data-role="join-next"]');
            const updateButtonState = () => {
                if ($allAgree.prop('checked')) {
                    $nextButton.prop('disabled', false).css({
                        "opacity": "1",
                        "cursor": "pointer"
                    });
                } else {
                    $nextButton.prop('disabled', true).css({
                        "opacity": "0.5",
                        "cursor": "not-allowed"
                    });
                }
            };
            updateButtonState();
            $allAgree.on('change', function () {
                const isChecked = $(this).prop('checked');
                $subCheckboxes.prop('checked', isChecked);
                updateButtonState();
            });
            $subCheckboxes.on('change', function () {
                const allChecked = $subCheckboxes.length === $subCheckboxes.filter(':checked').length;
                $allAgree.prop('checked', allChecked);
                updateButtonState();
            });
        });

                        "제 3 조 (서비스의 성격) ① 회사는 회원 간 정보 제공 및 거래를 연결하는 플랫폼 사업자입니다. ② 회원 간의 구인·구직 및 거래에 대한 책임은 해당 회원에게 있으며, 회사는 이에 대해 책임을 지지 않습니다.",

                        "제 2 장 이용계약",
                        "제 5 조 (이용계약 체결) 회원가입 신청 후 회사가 승낙함으로써 계약이 성립합니다. 기관회원은 필요 시 추가 서류를 제출해야 합니다.",

                },
                "privacyPolicy": {

                        "제 2 조 (수집하는 개인정보 항목)",
                        "1. 개인회원 회사는 회원가입 및 서비스 이용을 위해 다음 정보를 수집합니다.",
                        "① 필수항목: 아이디(ID), 비밀번호, 이름, 휴대전화번호",
                        "② 선택항목: 이메일 주소",

                        "회사는 원활한 서비스 제공을 위해 일부 업무를 외부에 위탁할 수 있습니다. (예: 문자 발송 서비스, 결제 시스템(PG사), 클라우드 서버 운영 등) 위탁 시 관련 법령에 따라 안전하게 관리합니다.",

                        "회사는 개인정보 보호를 위해 다음 조치를 시행합니다: 암호화 저장, 접근 권한 제한, 보안 시스템 운영",

            };
            const targetKey = ele.getAttribute('data-terms-key');
            const data = termsData[targetKey];
            if (!data) {
                console.error("해당 약관 데이터를 찾을 수 없습니다:", targetKey);
                return;
            }
            const contentHtml = data.content
                .map(line => `<p style="margin-bottom: 8px;">${line}</p>`)
                .join('');
            openModal(data.title, contentHtml);
        }

</script>
